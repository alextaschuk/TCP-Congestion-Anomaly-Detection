[formats]
# %d = date/time, %V = log level, %c = category, %m = message, %n = newline
concise = "%d(%H:%m:%s) [CLIENT] [%V] %c: %m%n"

[rules]
# Route specific categories to specific files inside /log/client/
ring_buffer.* "log/client/ring_buffer.log"; concise
handshake.* "log/client/handshake.log"; concise
client.* "../log/client/client.log"; concise

# send anything else to a general utcp log and print to console
*.* "log/client/utcp.log"; concise
*.* >stdout; concise