[formats]
concise = "%d(%H:%m:%s) [SERVER] [%V] %c: %m%n"
csv_format = "%m%n"

[rules] # filepaths are relative to the /build dir
main_thread.*   "log/server.log"; concise 
listen_thread.* "log/server.log"; concise
ticker_thread.* "log/server.log"; concise
cc_data.* "log/server_cnwd_output.csv"; csv_format

# print logs to the terminal too
*.* >stdout; concise
